<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - UniVan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#161122] text-white font-sans">

  <div class="flex min-h-screen">

   
    <aside class="w-64 bg-[#1A122A] p-6 shadow-lg">
      <h2 class="text-2xl font-bold text-white-400 mb-8">UniVan</h2>
      <nav class="space-y-4 text-lg text-gray-300">
        <a href="driverprofile.html" class="block hover:text-white-400 transition">Home</a>
        <a href="#" class="block hover:text-white-400 transition">Trips</a>
        <a href="#" class="block hover:text-white-400 transition">Drivers</a>
        <a href="#" class="block hover:text-white-400 transition">My reservations</a>
                <a href="#" class="block hover:text-white-400 transition">Support</a>
      </nav>
    </aside>

   
    <main class="flex-1 p-8">

      <p class="text-center text-3xl font-semibold text-white-400 mb-10">
        Hey! Welcome. Ready to go?
      </p>

   
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
        <div class="bg-[#221e2e] p-6 rounded-xl shadow-md">
          <p class="text-gray-400 mb-1">Total trips</p>
          <p class="text-3xl font-bold text-white">24</p>
        </div>
        <div class="bg-[#221e2e] p-6 rounded-xl shadow-md">
          <p class="text-gray-400 mb-1">transported students </p>
          <p class="text-3xl font-bold text-white">115</p>
        </div>
      </div>

    
      <h2 class="text-2xl font-semibold text-white mb-4">Upcoming Trips</h2>
      <div class="overflow-x-auto bg-[#221e2e] rounded-xl shadow-md">
        <table class="w-full text-left text-sm">
          <thead class="bg-[#342854] text-gray-400 uppercase text-xs">
            <tr>
              <th class="p-4">Time</th>
              <th class="p-4">Route</th>
              <th class="p-4">Driver</th>
              <th class="p-4">Passengers</th>
              <th class="p-4">Status</th>
              <th class="p-4">Feedback</th>
            </tr>
          </thead>
          <tbody class="text-gray-200">
            <tr class="border-t border-[#2E254A]">
              <td class="p-4">8:30 PM</td>
              <td class="p-4">UCA</td>
              <td class="p-4">Carlos</td>
             <td class="px-6 py-4">9</td>
              <td class="px-6 py-4"><span class="bg-green-600 text-white px-3 py-1 rounded-full text-xs">Completed</span></td>
              <td class="px-6 py-4"><a href="#" class="text color-skyblue underline">View</a></td>
            
            </tr>

            <tr class="border-t border-[#2E254A]">
              <td class="p-4">9:00 PM</td>
              <td class="p-4">UCA</td>
              <td class="p-4">Carlos</td>
              <td class="px-6 py-4">9</td>
              <td class="px-6 py-4"><span class="bg-green-600 text-white px-3 py-1 rounded-full text-xs">Completed</span></td>
              <td class="px-6 py-4"><a href="#" class="text-sky blue  underline">View</a></td>
              
            </tr>
            <tr class="border-t border-[#2E254A]">
              <td class="p-4">10:00 PM</td>
              <td class="p-4">UCA</td>
              <td class="p-4">Carlos</td>
              <td class="px-6 py-4">10</td>
              <td class="px-6 py-4"><span class="bg-yellow-600 text-white px-3 py-1 rounded-full text-xs">Scheduled</span></td>
              <td class="px-6 py-4"><a href="#" class="text-skyblue  underline">View</a></td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

</body>
</html>
